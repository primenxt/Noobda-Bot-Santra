<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Player Test</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:monospace;
    background:black;
    color:lime;
    overflow:hidden;
}

/* HACK SCREEN */
#hackScreen{
    text-align:left;
    padding:20px;
    width:100%;
    height:100vh;
    overflow:hidden;
    white-space:pre-line;
}

/* GAME SCREEN */
#game, #noobdaScreen{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    width:100%;
    height:100vh;
    background:white;
    color:black;
    font-family:Arial;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<!-- FAKE HACK SCREEN -->
<div id="hackScreen"></div>

<!-- GAME -->
<div id="game">
    <h1>Are You Pro Player?</h1>

    <div>
        <button onclick="blockYes()">Yes</button>
        <button onclick="showNoobda()">No</button>
    </div>
</div>

<!-- RESULT -->
<div id="noobdaScreen">
    <h1 style="font-size:60px;color:red;">
        😂 You are World's Biggest Noobda Bot 😂
    </h1>
</div>

<script>

let hackText = document.getElementById("hackScreen");

let lines = [
"Initializing system...",
"Connecting to server...",
"Hacking mainframe...",
"Bypassing security...",
"Access granted ✔",
"Loading game..."
];

let i = 0;

function runHack(){
    let interval = setInterval(()=>{
        if(i < lines.length){
            hackText.innerHTML += lines[i] + "\n";
            i++;
        } else {
            clearInterval(interval);

            // switch to game
            document.body.style.background = "white";
            document.getElementById("hackScreen").style.display = "none";
            document.getElementById("game").style.display = "flex";
        }
    }, 800);
}

function blockYes(){
    alert("❌ Access Denied! Only NO is allowed 😈");
}

function showNoobda(){
    document.getElementById("game").style.display = "none";
    document.getElementById("noobdaScreen").style.display = "flex";
}

// start hack animation on load
runHack();

</script>

</body>
</html>
