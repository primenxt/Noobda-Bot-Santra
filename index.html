<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noobda Bot Santra</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#000;
        overflow:hidden;
        font-family:Arial, sans-serif;
    }

    h1{
        font-size:5rem;
        text-transform:uppercase;
        font-weight:bold;
        animation: rgbGlow 3s linear infinite;
    }

    @keyframes rgbGlow{
        0%{
            color:red;
            text-shadow:
            0 0 10px red,
            0 0 20px red,
            0 0 40px red;
        }
        33%{
            color:lime;
            text-shadow:
            0 0 10px lime,
            0 0 20px lime,
            0 0 40px lime;
        }
        66%{
            color:blue;
            text-shadow:
            0 0 10px blue,
            0 0 20px blue,
            0 0 40px blue;
        }
        100%{
            color:red;
            text-shadow:
            0 0 10px red,
            0 0 20px red,
            0 0 40px red;
        }
    }
</style>
</head>
<body>

<h1>Noobda Bot Santra</h1>

</body>
</html>
