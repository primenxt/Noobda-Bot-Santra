<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Player Test</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:white;
    overflow:hidden;
}

h1{
    font-size:40px;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

#yes{
    position:absolute;
}

#game, #noobdaScreen{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

#noobdaScreen{
    display:none;
}

#bigText{
    font-size:60px;
    color:red;
    margin-top:20px;
    text-shadow:0 0 10px red;
}
</style>
</head>
<body>

<!-- GAME SCREEN -->
<div id="game">
    <h1>Are You Pro Player?</h1>

    <div>
        <button id="yes" onmouseover="moveYes()">Yes</button>
        <button onclick="showNoobda()">No</button>
    </div>
</div>

<!-- NOOBDA SCREEN -->
<div id="noobdaScreen">
    <h1 id="bigText">😂 You are World's Biggest Noobda Bot 😂</h1>
</div>

<script>
function moveYes(){
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    document.getElementById("yes").style.left = x + "px";
    document.getElementById("yes").style.top = y + "px";
}

function showNoobda(){
    document.getElementById("game").style.display = "none";
    document.getElementById("noobdaScreen").style.display = "flex";
}
</script>

</body>
</html>
