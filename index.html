<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funny Game</title>

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background-color:white; /* ✅ PURE WHITE BACKGROUND */
    overflow:hidden;
}

h1{
    font-size:40px;
}

.buttons{
    margin-top:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

#yes{
    position:absolute;
}

#laugh{
    display:none;
    font-size:120px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>Are You Pro Player?</h1>

<div class="buttons">
    <button id="yes" onmouseover="moveYes()">Yes</button>
    <button onclick="showLaugh()">No</button>
</div>

<div id="laugh">😂😂😂</div>

<script>
function moveYes(){
    let x = Math.random() * window.innerWidth - 100;
    let y = Math.random() * window.innerHeight - 100;

    document.getElementById("yes").style.left = x + "px";
    document.getElementById("yes").style.top = y + "px";
}

function showLaugh(){
    document.getElementById("laugh").style.display = "block";
}
</script>

</body>
</html>
