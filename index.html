<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Player Test</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:white;
}

h1{
    font-size:40px;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="game">
    <h1>Are You Pro Player?</h1>

    <div>
        <!-- ❌ YES looks normal but is blocked -->
        <button onclick="blockYes()">Yes</button>

        <!-- ✅ ONLY WORKING BUTTON -->
        <button onclick="showNoobda()">No</button>
    </div>
</div>

<!-- RESULT SCREEN -->
<div id="noobdaScreen" style="display:none; text-align:center;">
    <h1 style="font-size:60px; color:red;">
        😂 You are World's Biggest Noobda Bot 😂
    </h1>
</div>

<script>
function blockYes(){
    alert("❌ Access Denied! Only NO is allowed 😈");
}

function showNoobda(){
    document.getElementById("game").style.display = "none";
    document.getElementById("noobdaScreen").style.display = "block";
}
</script>

</body>
</html>
